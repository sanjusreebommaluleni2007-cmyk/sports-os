<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports OS - Session & Voice Logging</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/sessions.css">
</head>

<body>
    <div id="sidebar"></div>

    <div class="main-content">
        <header class="page-header">
            <div>
                <p class="page-meta" id="pageDate">MONDAY · 15 JUNE</p>
                <h1 class="page-title">Session & Voice Logging</h1>
                <p class="page-subtitle">Capture today's drill, notes and voice annotations.</p>
            </div>
            <div class="page-context">Field Mode · Tablet ready</div>
        </header>

        <section class="session-card">
            <div class="form-grid">
                <div class="field-group">
                    <label class="field-label" for="drillType">Drill Type</label>
                    <select id="drillType" class="input-control">
                        <option value="" disabled selected>Select drill type</option>
                        <!-- Filled dynamically by JS based on sport -->
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="sessionDate">Session Date</label>
                    <div class="input-with-icon">
                        <input type="date" id="sessionDate" class="input-control">
                        <span class="input-icon">📅</span>
                    </div>
                </div>
            </div>

            <div class="field-group full-width">
                <label class="field-label" for="sessionBatch">Select Batch</label>
                <select id="sessionBatch" class="input-control"></select>
            </div>
            <div class="field-group full-width">
                <label class="field-label" for="sessionAthlete">Student</label>
                <select id="sessionAthlete" class="input-control">
                    <option value="">Select a batch first</option>
                </select>
            </div>

            <div id="recordingStudentBanner" class="recording-student-banner" style="display:none;">
                Recording for: <strong id="recordingStudentName"></strong>
            </div>
            <div class="field-group full-width">
                <label class="field-label" for="coachNotes">Coach Notes</label>
                <textarea id="coachNotes" class="textarea-control"
                    placeholder="Describe the drill, observations, athlete-specific cues..."></textarea>
            </div>

            <div class="action-row">
                <button id="voiceRecordBtn" class="voice-btn">🎙️ Hold to Record Voice Note</button>
                <button id="saveSessionBtn" class="save-btn">💾 Save Session</button>
            </div>

            <div id="voicePlayback" class="voice-playback">
                <div class="playback-header">
                    <p id="voicePlaybackText">🎤 Voice note recorded — 0s</p>
                    <button id="deleteVoiceBtn" class="remove-voice-btn">✕ Remove</button>
                </div>
                <audio id="voiceAudio" controls></audio>
            </div>
        </section>

        <section class="recent-sessions-section">
            <h2>Recent Sessions</h2>
            <div id="sessionsList"></div>
        </section>

        <div id="sessionModalOverlay" class="session-modal-overlay" style="display:none;">
            <div class="session-modal">
                <button id="closeSessionModal" class="session-modal-close">✕</button>
                <span id="modalDrillBadge" class="drill-badge"></span>
                <h3 id="modalDrillType"></h3>
                <p id="modalMeta" class="session-meta"></p>
                <p id="modalStudent" class="session-meta"></p>
                <div class="modal-notes">
                    <strong>Coach Notes</strong>
                    <p id="modalNotes"></p>
                </div>
                <div id="modalAudioWrap" style="display:none;">
                    <strong>Voice Note</strong>
                    <audio id="modalAudio" controls style="width:100%;margin-top:8px;"></audio>
                </div>
            </div>
        </div>

    </div>

    <script src="../js/sidebar.js?v=2"></script>
    <script src="../js/sessions.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW failed:', err));
        }
    </script>
</body>

</html>

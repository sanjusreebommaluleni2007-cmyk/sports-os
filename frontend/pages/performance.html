<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance & Benchmarks · Sports OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/sidebar.css?v=3">
    <link rel="stylesheet" href="../css/performance.css">
</head>

<body>

    <div id="sidebar"></div>

    <div class="main-content">

        <div class="page-header">
            <p id="pageDate" class="page-date">WEDNESDAY · 17 JUNE</p>
            <h1 class="page-title">Performance & Benchmarks</h1>
            <p class="page-subtitle">Visualise athlete progress against competition targets.</p>
            <span class="field-mode-badge">Field Mode · Tablet ready</span>
        </div>

        <div class="card filter-card">
            <div class="filter-grid">
                <div class="form-group" id="athleteGroup">
                    <label class="filter-label">ATHLETE</label>
                    <select id="athleteSelect" class="form-control">
                        <option value="">Loading athletes...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="filter-label">METRIC</label>
                    <select id="metricSelect" class="form-control">
                        <optgroup label="Real Data">
                            <option value="real:attendance">Attendance %</option>
                            <option value="real:sessions">Session Count</option>
                        </optgroup>
                        <optgroup label="Performance Metrics" id="sportMetricsGroup">
                            <!-- Filled dynamically by JS based on sport -->
                        </optgroup>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group" id="monthPickerGroup" style="display:none; margin-bottom:16px;">
            <label class="filter-label">PICK MONTH</label>
            <input type="month" id="monthPicker" class="form-control">
        </div>

        <div class="card chart-card">
            <div class="chart-header">
                <div>
                    <h2 id="chartTitle" class="chart-title">Attendance %</h2>
                    <p id="chartSubtitle" class="chart-subtitle">Select an athlete · last 6 months</p>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:12px;">
                    <button id="downloadReportBtn" class="btn-secondary" style="font-size:13px;padding:7px 16px;">⬇
                        Download CSV</button>
                    <div class="view-toggle">
                        <button id="toggleMonthly" class="toggle-btn active">Monthly</button>
                        <button id="toggleDaily" class="toggle-btn">Daily (30d)</button>
                        <button id="toggleMonth" class="toggle-btn">Pick Month</button>
                    </div>
                    <div class="chart-controls">
                        <div class="chart-legend">
                            <div class="legend-item">
                                <div class="legend-dot"></div>
                                <span id="legendMetric">Attendance %</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dash"></div>
                                <span>Benchmark</span>
                            </div>
                        </div>
                        <div class="zoom-controls">
                            <button id="zoomOutBtn" class="zoom-btn">−</button>
                            <span id="zoomLevel" class="zoom-level">100%</span>
                            <button id="zoomInBtn" class="zoom-btn">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-wrap" style="position:relative;">
                    <canvas id="performanceChart"></canvas>
                    <div class="benchmark-label">Competition Benchmark Target</div>
                </div>
                <div class="chart-wrap">
                    <canvas id="performanceBarChart"></canvas>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-label">6-MO AVERAGE</div>
                    <div id="statAvg" class="stat-value">—</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">LATEST</div>
                    <div id="statLatest" class="stat-value positive">—</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">VS BENCHMARK</div>
                    <div id="statBenchmark" class="stat-value positive">—</div>
                    <div id="statBenchmarkSub" class="stat-sub"></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">TRAJECTORY</div>
                    <div id="statTrajectory" class="stat-value">—</div>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="../js/sidebar.js?v=3"></script>
    <script src="../js/performance.js"></script>
    <script src="../js/log-score-modal.js"></script>
    <script src="../js/download-report.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW failed:', err));
        }
    </script>
</body>

</html>
